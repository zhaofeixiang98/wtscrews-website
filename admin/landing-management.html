<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>落地页管理 - 管理后台</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --blue: #2563eb;
      --blue-strong: #1d4ed8;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 18px;
      --shadow: 0 14px 45px rgba(15, 23, 42, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
    a { color: inherit; text-decoration: none; }
    .admin-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .admin-header .container { max-width: 1900px; margin: 0 auto; padding: 20px 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 44px; height: 44px; border-radius: 14px; background: #dbeafe; display: grid; place-items: center; color: #1d4ed8; font-size: 1.3rem; }
    .brand-text .title { font-size: 1.1rem; font-weight: 700; }
    .brand-text .subtitle { color: var(--muted); font-size: 0.92rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .nav-links a, .nav-links button { padding: 10px 14px; border-radius: 12px; font-size: 0.92rem; font-weight: 600; border: 1px solid transparent; background: #f8fafc; color: var(--text); transition: all 0.2s ease; }
    .nav-links a:hover, .nav-links button:hover { background: #eff6ff; border-color: #dbeafe; }
    .container { max-width: 1900px; margin: 0 auto; padding: 24px; }
    .page-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
    .page-desc { color: var(--muted); margin-bottom: 24px; font-size: 1rem; }
    .tool-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 24px; }
    .tool-bar input, .tool-bar select {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      background: #fff;
    }
    .tool-bar input { min-width: 240px; flex: 1; }
    .tool-bar button { padding: 12px 18px; border-radius: 12px; background: var(--blue); color: #fff; border: none; font-size: 0.92rem; font-weight: 700; cursor: pointer; }
    .tool-status { min-height: 22px; margin: -8px 0 18px; font-size: 0.92rem; font-weight: 600; }
    .tool-status.success { color: #15803d; }
    .tool-status.error { color: #b91c1c; }
    .summary-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .summary-card { background: var(--surface); border-radius: 20px; padding: 22px; box-shadow: var(--shadow); border: 1px solid #eff6ff; }
    .summary-card .label { color: var(--muted); font-size: 0.92rem; margin-bottom: 14px; }
    .summary-card .value { font-size: 2rem; font-weight: 800; color: var(--blue-strong); }
    .landing-grid { display: grid; gap: 14px; }
    .landing-item { background: var(--surface); border-radius: 18px; border: 1px solid var(--border); box-shadow: var(--shadow); padding: 18px; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; }
    .landing-item .title { font-size: 1rem; font-weight: 700; }
    .landing-item .slug { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
    .landing-item .meta { color: var(--muted); font-size: 0.86rem; margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    .lang-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .lang-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .lang-chip.ok { background: #dcfce7; border-color: #86efac; color: #166534; }
    .lang-chip.miss { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
    .lang-summary { margin-top: 10px; font-size: 0.84rem; color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn { border: none; border-radius: 10px; padding: 9px 12px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
    .btn-preview { background: #dbeafe; color: #1e40af; }
    .btn-open { background: #e0f2fe; color: #0369a1; }
    .btn-translate { background: #ede9fe; color: #6d28d9; }
    .btn-status { background: #ecfeff; color: #0f766e; }
    .btn-delete { background: #dc2626; color: #fff; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .empty-state { background: var(--surface); border-radius: 22px; padding: 40px; box-shadow: var(--shadow); text-align: center; color: var(--muted); }
    .dialog-mask { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.48); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 200; }
    .dialog { width: min(760px, 100%); max-height: 85vh; overflow: auto; background: #fff; border-radius: 24px; box-shadow: 0 24px 80px rgba(15, 23, 42, 0.25); border: 1px solid #e5e7eb; }
    .dialog-head { padding: 22px 24px 16px; border-bottom: 1px solid #eef2f7; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .dialog-title { font-size: 1.1rem; font-weight: 800; }
    .dialog-sub { color: var(--muted); font-size: 0.92rem; margin-top: 6px; }
    .dialog-close { border: 0; background: #f3f4f6; color: #111827; width: 38px; height: 38px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: 700; }
    .dialog-body { padding: 22px 24px 24px; display: grid; gap: 16px; }
    .status-hero { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .status-card { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 18px; padding: 16px; }
    .status-card .k { color: var(--muted); font-size: 0.84rem; margin-bottom: 8px; }
    .status-card .v { font-size: 1.2rem; font-weight: 800; }
    .status-detail-grid { display: grid; gap: 10px; }
    .status-lang { display: grid; gap: 10px; border: 1px solid #e5e7eb; border-radius: 18px; padding: 14px 16px; background: #fff; }
    .status-lang-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .status-pill { display: inline-flex; align-items: center; padding: 6px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 800; border: 1px solid transparent; }
    .status-pill.done { background: #dcfce7; color: #166534; border-color: #86efac; }
    .status-pill.fail { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .status-pill.run { background: #dbeafe; color: #1d4ed8; border-color: #bfdbfe; }
    .status-pill.wait { background: #f3f4f6; color: #4b5563; border-color: #e5e7eb; }
    .status-error { color: #991b1b; font-size: 0.88rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .toast-wrap { position: fixed; right: 24px; bottom: 24px; z-index: 260; display: grid; gap: 10px; }
    .toast {
      min-width: 280px;
      max-width: 420px;
      padding: 14px 16px;
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #111827;
      font-size: 0.92rem;
      line-height: 1.55;
    }
    .toast.success { border-color: #86efac; background: #f0fdf4; }
    .toast.error { border-color: #fecaca; background: #fef2f2; }
    @media (max-width: 860px) {
      .tool-bar { flex-direction: column; align-items: stretch; }
      .landing-item { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .dialog-mask { padding: 12px; }
      .dialog-head, .dialog-body { padding-left: 16px; padding-right: 16px; }
      .toast-wrap { left: 12px; right: 12px; bottom: 12px; }
      .toast { min-width: 0; max-width: none; width: 100%; }
    }
  </style>
  <link rel="stylesheet" href="admin-unified.css?v=20260424">
</head>
<body>
  <header class="admin-header">
    <div class="container">
      <div class="brand">
        <div class="brand-icon">🚀</div>
        <div class="brand-text">
          <div class="title">落地页管理</div>
          <div class="subtitle">预览、搜索、删除已发布落地页</div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html">🏠 后台首页</a>
        <a href="landing-new.html">🚀 发布落地页</a>
        <a href="landing-management.html">📄 落地页管理</a>
        <a href="users-view.html">📋 用户数据</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">落地页管理</h1>
    <p class="page-desc">这里管理通过后台生成的落地页（路径：`/pags/{lang}/landing/{slug}.html`）。可按语言预览并支持一键删除所有语言版本。</p>
    <div class="tool-bar">
      <input type="text" id="searchInput" placeholder="搜索 slug 或标题...">
      <select id="previewLang">
        <option value="zh">预览语言：中文</option>
        <option value="en">预览语言：English</option>
        <option value="es">预览语言：Español</option>
        <option value="fr">预览语言：Français</option>
        <option value="de">预览语言：Deutsch</option>
        <option value="ar">预览语言：العربية</option>
        <option value="id">预览语言：Indonesia</option>
        <option value="ja">预览语言：日本語</option>
        <option value="ko">预览语言：한국어</option>
      </select>
      <button id="addLandingBtn">发布新落地页</button>
    </div>
    <div class="tool-status" id="actionStatus"></div>

    <div class="summary-panel">
      <div class="summary-card">
        <div class="label">落地页数量</div>
        <div class="value" id="landingCount">-</div>
      </div>
      <div class="summary-card">
        <div class="label">支持语言总数</div>
        <div class="value" id="langCount">-</div>
      </div>
    </div>

    <section class="landing-grid" id="landingContainer">
      <div class="empty-state">加载中...</div>
    </section>
  </main>

  <div class="dialog-mask" id="statusDialog">
    <div class="dialog">
      <div class="dialog-head">
        <div>
          <div class="dialog-title" id="dialogTitle">翻译进度</div>
          <div class="dialog-sub" id="dialogSub">正在读取状态...</div>
        </div>
        <button type="button" class="dialog-close" id="closeStatusDialog">×</button>
      </div>
      <div class="dialog-body">
        <div class="status-hero" id="statusHero"></div>
        <div class="status-detail-grid" id="statusDetail"></div>
        <div class="dialog-actions">
          <button type="button" class="btn btn-status" id="refreshStatusBtn">刷新状态</button>
          <button type="button" class="btn btn-translate" id="retranslateFromDialogBtn">重新翻译全部语言</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    let allLandings = [];
    let deletingSlug = '';
    let translatingSlug = '';
    let statusDialogSlug = '';
    let statusPollTimer = null;
    let lastStatusValue = '';
    const LANG_ORDER = ['en', 'ar', 'de', 'es', 'fr', 'id', 'ja', 'ko', 'zh'];
    const LANG_LABELS = { en: 'EN', ar: 'AR', de: 'DE', es: 'ES', fr: 'FR', id: 'ID', ja: 'JA', ko: 'KO', zh: 'ZH' };

    function logout(e) {
      if (e) e.preventDefault();
      localStorage.removeItem('userAdminAuth');
      window.location.href = 'login.html';
    }
    var logoutBtn = document.getElementById('logoutBtn') || document.querySelector('.logout-btn');
    if (logoutBtn) logoutBtn.addEventListener('click', logout);

    function checkAuth() {
      const auth = localStorage.getItem('userAdminAuth');
      if (!auth || new Date().getTime() > parseInt(auth, 10)) {
        window.location.href = 'login.html';
        return false;
      }
      return true;
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setActionStatus(message, type) {
      const status = document.getElementById('actionStatus');
      status.className = 'tool-status' + (type ? ' ' + type : '');
      status.textContent = message || '';
    }

    function setDeleteButtonsDisabled(disabled) {
      document.querySelectorAll('.btn-delete').forEach(function(btn) {
        btn.disabled = disabled;
      });
    }

    function setTranslateButtonsDisabled(disabled) {
      document.querySelectorAll('.btn-translate').forEach(function(btn) {
        btn.disabled = disabled;
      });
    }

    function showToast(message, type) {
      const wrap = document.getElementById('toastWrap');
      const node = document.createElement('div');
      node.className = 'toast' + (type ? ' ' + type : '');
      node.textContent = message || '';
      wrap.appendChild(node);
      setTimeout(function() {
        node.remove();
      }, 4200);
    }

    function choosePreviewUrl(item) {
      const lang = document.getElementById('previewLang').value;
      const urls = item.urls || {};
      return urls[lang] || urls.zh || urls.en || item.preview_url || '';
    }

    async function loadLandings() {
      if (!checkAuth()) return;
      const container = document.getElementById('landingContainer');
      container.innerHTML = '<div class="empty-state">加载中...</div>';
      try {
        const resp = await fetch('../cgi-bin/landing-list.cgi?_=' + Date.now());
        const data = await resp.json();
        if (!resp.ok || !data.success) throw new Error(data.error || '读取失败');
        allLandings = Array.isArray(data.items) ? data.items : [];
        document.getElementById('landingCount').textContent = allLandings.length;
        const totalLangs = allLandings.reduce(function(sum, item) {
          return sum + ((item.langs || []).length || 0);
        }, 0);
        document.getElementById('langCount').textContent = totalLangs;
        renderLandings();
      } catch (err) {
        allLandings = [];
        container.innerHTML = '<div class="empty-state">加载失败：' + escHtml(err.message) + '</div>';
      }
    }

    function renderLandings() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      const container = document.getElementById('landingContainer');
      const filtered = allLandings.filter(function(item) {
        const slug = String(item.slug || '').toLowerCase();
        const title = String(item.title || '').toLowerCase();
        return !keyword || slug.includes(keyword) || title.includes(keyword);
      });

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state">没有匹配的落地页。</div>';
        return;
      }

      let html = '';
      filtered.forEach(function(item) {
        const updatedAt = item.updated_at ? new Date(item.updated_at).toLocaleString() : '-';
        const typeLabel = item.kind === 'root' ? '根目录落地页' : 'landing 子目录';
        const langs = Array.isArray(item.langs) ? item.langs : [];
        const missingLangs = Array.isArray(item.missing_langs) ? item.missing_langs : [];
        const langLabels = item.lang_labels || {};
        const allLangs = ['en', 'ar', 'de', 'es', 'fr', 'id', 'ja', 'ko', 'zh'];
        const langChips = allLangs.map(function(lang) {
          const ok = langs.includes(lang);
          const label = escHtml(langLabels[lang] || lang.toUpperCase());
          return '<span class="lang-chip ' + (ok ? 'ok' : 'miss') + '">' + label + '</span>';
        }).join('');
        const summaryLine = item.complete
          ? '9/9 语言已生成'
          : ('已生成 ' + langs.length + '/9，缺少：' + escHtml(missingLangs.join(', ')));
        html += '<div class="landing-item">' +
          '<div>' +
            '<div class="title">' + escHtml(item.title || item.slug) + '</div>' +
            '<div class="slug">slug: ' + escHtml(item.slug) + '</div>' +
            '<div class="meta">' +
              '<span>类型: ' + escHtml(typeLabel) + '</span>' +
              '<span>语言: ' + escHtml(langs.join(', ')) + '</span>' +
              '<span>更新: ' + escHtml(updatedAt) + '</span>' +
            '</div>' +
            '<div class="lang-row">' + langChips + '</div>' +
            '<div class="lang-summary">' + summaryLine + '</div>' +
          '</div>' +
          '<div class="actions">' +
            '<button type="button" class="btn btn-preview" data-action="preview" data-id="' + escHtml(item.id || '') + '">预览</button>' +
            '<button type="button" class="btn btn-open" data-action="open-en" data-id="' + escHtml(item.id || '') + '">打开 EN</button>' +
            '<button type="button" class="btn btn-translate" data-action="retranslate" data-id="' + escHtml(item.id || '') + '">重新翻译</button>' +
            '<button type="button" class="btn btn-status" data-action="status" data-id="' + escHtml(item.id || '') + '">查看进度</button>' +
            '<button type="button" class="btn btn-delete" data-action="delete" data-id="' + escHtml(item.id || '') + '">删除</button>' +
          '</div>' +
        '</div>';
      });
      container.innerHTML = html;

      setDeleteButtonsDisabled(Boolean(deletingSlug));
      setTranslateButtonsDisabled(Boolean(translatingSlug));
      container.querySelectorAll('button[data-action]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const action = this.dataset.action;
          const id = this.dataset.id;
          const item = allLandings.find(function(x) { return x.id === id; });
          if (!item) return;
          if (action === 'preview') {
            const url = choosePreviewUrl(item);
            if (url) window.open(url, '_blank');
          } else if (action === 'open-en') {
            if (item.urls && item.urls.en) window.open(item.urls.en, '_blank');
          } else if (action === 'retranslate') {
            handleRetranslate(item);
          } else if (action === 'status') {
            openStatusDialog(item);
          } else if (action === 'delete') {
            handleDeleteLanding(item);
          }
        });
      });
    }

    async function handleDeleteLanding(item) {
      if (!checkAuth()) return;
      if (!item || !item.slug || deletingSlug) return;
      const ok = window.confirm('确认删除落地页 “' + item.slug + '” 吗？\n\n将删除所有语言版本。');
      if (!ok) return;

      deletingSlug = item.id || item.slug;
      setActionStatus('正在删除：' + item.slug + ' ...');
      setDeleteButtonsDisabled(true);

      try {
        const params = new URLSearchParams();
        params.append('slugs', item.id || ('folder:' + item.slug));
        const resp = await fetch('../cgi-bin/landing-delete.cgi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        });
        const data = await resp.json();
        if (!resp.ok || !data.success) {
          throw new Error((data.errors || [data.error]).filter(Boolean).join('；') || '删除失败');
        }
        setActionStatus('已删除落地页：' + item.slug, 'success');
        await loadLandings();
      } catch (err) {
        setActionStatus('删除失败：' + err.message, 'error');
        alert('删除失败：' + err.message);
      } finally {
        deletingSlug = '';
        setDeleteButtonsDisabled(false);
      }
    }

    async function handleRetranslate(item) {
      if (!checkAuth()) return;
      if (!item || !item.slug || translatingSlug) return;
      const ok = window.confirm('确认重新翻译落地页 “' + item.slug + '” 吗？\n\n将使用当前英文页重新生成其它语言内容。');
      if (!ok) return;

      translatingSlug = item.slug;
      setTranslateButtonsDisabled(true);
      setActionStatus('正在提交重翻译任务：' + item.slug + ' ...');

      try {
        const params = new URLSearchParams();
        params.append('slug', item.slug);
        const resp = await fetch('../cgi-bin/landing-retranslate.cgi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        });
        const data = await resp.json();
        if (!resp.ok || !data.success) {
          throw new Error(data.error || '启动重翻译失败');
        }
        setActionStatus('已开始重翻译：' + item.slug, 'success');
        openStatusDialog(item);
      } catch (err) {
        setActionStatus('重翻译失败：' + err.message, 'error');
        alert('重翻译失败：' + err.message);
      } finally {
        translatingSlug = '';
        setTranslateButtonsDisabled(false);
      }
    }

    function closeStatusDialog() {
      document.getElementById('statusDialog').style.display = 'none';
      statusDialogSlug = '';
      lastStatusValue = '';
      if (statusPollTimer) {
        clearTimeout(statusPollTimer);
        statusPollTimer = null;
      }
    }

    function openStatusDialog(item) {
      if (!item || !item.slug) return;
      statusDialogSlug = item.slug;
      document.getElementById('dialogTitle').textContent = '翻译进度 · ' + item.slug;
      document.getElementById('dialogSub').textContent = '正在读取当前翻译状态...';
      document.getElementById('statusHero').innerHTML = '';
      document.getElementById('statusDetail').innerHTML = '<div class="empty-state" style="padding:22px">读取中...</div>';
      document.getElementById('statusDialog').style.display = 'flex';
      lastStatusValue = '';
      refreshStatusDialog();
    }

    function renderStatusDialog(slug, data) {
      const done = Array.isArray(data.completed) ? data.completed : [];
      const failed = data.failed && typeof data.failed === 'object' ? data.failed : {};
      const total = Number(data.total || 8);
      const failedKeys = Object.keys(failed);
      const status = data.status || 'not_found';
      const running = status === 'starting' || status === 'running';
      const hero = document.getElementById('statusHero');
      const detail = document.getElementById('statusDetail');
      let statusText = '未找到翻译任务';
      if (status === 'done') statusText = '翻译已完成';
      else if (status === 'partial_error') statusText = '部分语言翻译失败';
      else if (status === 'starting') statusText = '翻译任务启动中';
      else if (status === 'running') statusText = '翻译进行中';
      document.getElementById('dialogSub').textContent = statusText + ' · slug: ' + slug;

      hero.innerHTML =
        '<div class="status-card"><div class="k">当前状态</div><div class="v">' + escHtml(statusText) + '</div></div>' +
        '<div class="status-card"><div class="k">已完成</div><div class="v">' + done.length + ' / ' + total + '</div></div>' +
        '<div class="status-card"><div class="k">失败语言</div><div class="v">' + failedKeys.length + '</div></div>';

      detail.innerHTML = LANG_ORDER.map(function(lang) {
        if (lang === 'en') {
          return '<div class="status-lang"><div class="status-lang-head"><strong>EN</strong><span class="status-pill done">源语言</span></div></div>';
        }
        let pillClass = 'wait';
        let pillText = '等待中';
        let errorText = '';
        if (done.includes(lang)) {
          pillClass = 'done';
          pillText = '已完成';
        } else if (failed[lang]) {
          pillClass = 'fail';
          pillText = '失败';
          errorText = '<div class="status-error">' + escHtml(failed[lang]) + '</div>';
        } else if (running) {
          pillClass = 'run';
          pillText = '翻译中';
        }
        return '<div class="status-lang">' +
          '<div class="status-lang-head"><strong>' + escHtml(LANG_LABELS[lang] || lang.toUpperCase()) + '</strong><span class="status-pill ' + pillClass + '">' + pillText + '</span></div>' +
          errorText +
        '</div>';
      }).join('');

      if (lastStatusValue && lastStatusValue !== status) {
        if (status === 'done') {
          setActionStatus('翻译完成：' + slug, 'success');
          showToast('翻译完成：' + slug + '，列表已自动刷新。', 'success');
        } else if (status === 'partial_error') {
          const failedList = failedKeys.length ? (' 失败语言：' + failedKeys.join(', ')) : '';
          setActionStatus('翻译部分完成：' + slug + failedList, 'error');
          showToast('翻译部分完成：' + slug + '。' + failedList, 'error');
        }
      }
      lastStatusValue = status;

      if (running) {
        if (statusPollTimer) clearTimeout(statusPollTimer);
        statusPollTimer = setTimeout(refreshStatusDialog, 2500);
      } else if (statusPollTimer) {
        clearTimeout(statusPollTimer);
        statusPollTimer = null;
        loadLandings();
      }
    }

    async function refreshStatusDialog() {
      if (!statusDialogSlug) return;
      try {
        const resp = await fetch('../cgi-bin/translation-status.cgi?slug=' + encodeURIComponent(statusDialogSlug) + '&_=' + Date.now());
        const data = await resp.json();
        renderStatusDialog(statusDialogSlug, data || {});
      } catch (err) {
        document.getElementById('dialogSub').textContent = '读取状态失败';
        document.getElementById('statusDetail').innerHTML = '<div class="empty-state" style="padding:22px">状态读取失败：' + escHtml(err.message) + '</div>';
      }
    }

    document.getElementById('addLandingBtn').addEventListener('click', function() {
      window.location.href = 'landing-new.html';
    });
    document.getElementById('searchInput').addEventListener('input', renderLandings);
    document.getElementById('previewLang').addEventListener('change', renderLandings);
    document.getElementById('closeStatusDialog').addEventListener('click', closeStatusDialog);
    document.getElementById('statusDialog').addEventListener('click', function(e) {
      if (e.target === this) closeStatusDialog();
    });
    document.getElementById('refreshStatusBtn').addEventListener('click', refreshStatusDialog);
    document.getElementById('retranslateFromDialogBtn').addEventListener('click', function() {
      if (!statusDialogSlug) return;
      const item = allLandings.find(function(x) { return x.slug === statusDialogSlug; });
      if (item) handleRetranslate(item);
    });

    loadLandings();
  </script>
  <script src="admin-nav.js?v=20260424" defer></script>
</body>
