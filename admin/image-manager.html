<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片管理 - 管理后台</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --primary: #2563eb;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 18px;
      --shadow: 0 14px 45px rgba(15, 23, 42, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
    a { color: inherit; text-decoration: none; }
    .admin-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .admin-header .container { max-width: 1900px; margin: 0 auto; padding: 20px 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 44px; height: 44px; border-radius: 14px; background: #dbeafe; display: grid; place-items: center; color: #1d4ed8; font-size: 1.3rem; }
    .brand-text .title { font-size: 1.1rem; font-weight: 700; }
    .brand-text .subtitle { color: var(--muted); font-size: 0.92rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .nav-links a, .nav-links button { padding: 10px 14px; border-radius: 12px; font-size: 0.92rem; font-weight: 600; border: 1px solid transparent; background: #f8fafc; color: var(--text); transition: all 0.2s ease; }
    .nav-links a:hover, .nav-links button:hover { background: #eff6ff; border-color: #dbeafe; }
    .nav-links .primary { background: var(--primary); color: white; }
    .container { max-width: 1900px; margin: 0 auto; padding: 24px; }
    .page-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .page-desc { color: var(--muted); margin-bottom: 20px; }
    .upload-panel { display: grid; gap: 18px; margin-bottom: 26px; }
    .upload-card { background: var(--surface); border-radius: 22px; padding: 24px; box-shadow: var(--shadow); border: 1px solid #e8eef9; }
    .upload-card h2 { font-size: 1.05rem; margin-bottom: 14px; }
    .upload-zone { border: 2px dashed #dbeafe; border-radius: 18px; background: #f8fbff; padding: 30px; text-align: center; color: var(--muted); cursor: pointer; position: relative; transition: border-color 0.2s, background 0.2s; }
    .upload-zone.hover { border-color: #93c5fd; background: #eff6ff; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-zone strong { color: var(--primary); }
    .upload-hint { margin-top: 14px; color: var(--muted); font-size: 0.95rem; }
    .upload-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-top: 18px; }
    .upload-input { border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; background: #fff; font-size: 0.95rem; width: 100%; }
    .btn-primary { padding: 13px 18px; border-radius: 14px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #1d4ed8; }
    .status-line { color: var(--muted); font-size: 0.95rem; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 22px; align-items: stretch; }
    .image-card { background: linear-gradient(180deg, #ffffff, #f8fafc); border-radius: 22px; border: 1px solid #e2e8f0; box-shadow: 0 18px 48px rgba(15, 23, 42, 0.09); overflow: hidden; display: flex; flex-direction: column; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .image-card:hover { transform: translateY(-3px); box-shadow: 0 24px 60px rgba(15, 23, 42, 0.13); border-color: #bfdbfe; }
    .image-card.used { border-color: #bbf7d0; }
    .image-card .thumb-wrap { position: relative; background: #eef2f7; padding: 10px; }
    .image-card .thumb { width: 100%; aspect-ratio: 1.32; object-fit: contain; background: linear-gradient(135deg,#f8fafc,#eef2f7); border-radius: 16px; border: 1px solid rgba(148,163,184,.22); }
    .image-card .meta { padding: 15px 15px 18px; display: grid; gap: 10px; }
    .image-card .meta strong { font-size: 0.95rem; display: block; color: var(--text); word-break: break-all; line-height: 1.35; }
    .image-card .meta span { font-size: 0.85rem; color: var(--muted); }
    .image-card .badge { display: inline-flex; padding: 6px 10px; font-size: 0.78rem; font-weight: 800; border-radius: 999px; background: #eef2ff; color: #2563eb; white-space: nowrap; }
    .image-card.used .badge { background: #dcfce7; color: #15803d; }
    .image-card .full-url { display: block; width: 100%; padding: 9px 10px; border-radius: 12px; border: 1px solid #dbeafe; background: #eff6ff; color: #1d4ed8; font-size: 0.78rem; line-height: 1.45; word-break: break-all; user-select: all; cursor: copy; }
    .image-card .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 2px; align-items: center; }
    .image-card .select-label { display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 12px; padding: 10px 12px; background: #f8fafc; border: 1px solid #e2e8f0; font-weight: 700; cursor: pointer; }
    .image-card button { width: 100%; border: none; border-radius: 12px; padding: 10px 12px; font-weight: 700; cursor: pointer; }
    .btn-copy { background: #2563eb; color: #fff; }
    .btn-copy:hover { background: #1d4ed8; }
    .btn-delete { background: #fff1f2; color: #b91c1c; border: 1px solid #fecdd3 !important; }
    .btn-delete:hover { background: #fee2e2; }
    .btn-select { background: #f8fafc; color: var(--text); }
    .image-meta-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .stats-row { display: flex; flex-wrap: wrap; gap: 16px; margin: 24px 0; }
    .stat-card { flex: 1 1 220px; background: var(--surface); border-radius: 18px; border: 1px solid #e2e8f0; padding: 20px; box-shadow: var(--shadow); }
    .stat-card .label { margin-bottom: 8px; color: var(--muted); font-size: 0.92rem; }
    .stat-card .value { font-size: 1.75rem; font-weight: 800; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
    .filter-row input { flex: 1; border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; background: #fff; }
    .btn-delete-selected { padding: 12px 18px; border-radius: 14px; border: none; background: #ef4444; color: white; font-weight: 700; cursor: pointer; }
    .btn-delete-selected:disabled { opacity: 0.5; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); background: var(--surface); border: 1px dashed var(--border); border-radius: 20px; }
    @media (max-width: 860px) { .filter-row { flex-direction: column; } }
  </style>
  <link rel="stylesheet" href="admin-unified.css?v=20260424">
  <script src="admin-auth-helper.js?v=20260503"></script>
</head>
<body>
  <header class="admin-header">
    <div class="container">
      <div class="brand">
        <div class="brand-icon">🖼️</div>
        <div class="brand-text">
          <div class="title">图片管理</div>
          <div class="subtitle">上传、浏览和删除新闻图片</div>
        </div>
      </div>
            <nav class="admin-nav">
        <a href="index.html">🏠 后台首页</a>
        <a href="article-new.html">✍️ 发布文章</a>
        <a href="article-list.html">📝 文章列表</a>
        <a href="product-new.html">🛠️ 发布产品</a>
        <a href="product-management.html">🛍️ 产品管理</a>
        <a href="image-manager.html">🖼️ 图片管理</a>
        <a href="users-view.html">📋 用户数据</a>
        <button id="logoutBtn" class="logout-btn" onclick="logout()">退出登录</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <h1 class="page-title">图片管理</h1>
    <p class="page-desc">通过上传功能新增图片，并使用筛选与删除功能维护 /images/news/ 图片库。</p>
    <section class="upload-panel">
      <div class="upload-card">
        <h2>上传图片</h2>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*">
          <div>
            <p><strong>点击或拖拽图片到此处</strong></p>
            <p class="upload-hint">支持 JPG / PNG / WEBP / GIF / SVG</p>
          </div>
        </div>
        <div class="upload-actions">
          <input type="text" id="renameInput" class="upload-input" placeholder="重命名（可选，去掉扩展名）">
          <input type="text" id="altInput" class="upload-input" placeholder="Alt 文本（可选）">
          <button class="btn-primary" id="uploadBtn">上传并设为封面</button>
        </div>
        <p class="status-line" id="uploadStatus">上传后会显示图片，并自动进入新闻封面管理流程。</p>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="label">图片总数</div><div class="value" id="totalImages">-</div></div>
        <div class="stat-card"><div class="label">未使用</div><div class="value" id="unusedImages">-</div></div>
      </div>
    </section>
    <section class="upload-card">
      <div class="filter-row">
        <input type="text" id="searchInput" placeholder="按文件名搜索图片...">
        <button class="btn-delete-selected" id="deleteSelectedBtn" disabled>删除所选图片</button>
      </div>
      <div id="imageGrid" class="image-grid"><div class="empty-state">加载中...</div></div>
    </section>
  </main>
  <script data-cfasync="false">
    function logout() { WTAdminAuth.logout(); }
    var logoutBtn = document.getElementById('logoutBtn') || document.querySelector('.logout-btn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', logout);
    }
    async function checkAuth() { return await WTAdminAuth.ensure(); }
    function escHtml(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    const imageGrid = document.getElementById('imageGrid');
    const deleteBtn = document.getElementById('deleteSelectedBtn');
    let images = [];

    async function loadImages() {
      imageGrid.innerHTML = '<div class="empty-state">加载中...</div>';
      try {
        const authed = await checkAuth();
        if (!authed) {
          imageGrid.innerHTML = '<div class="empty-state">登录状态已失效，请重新登录后台。</div>';
          return;
        }
        const resp = await fetch('../cgi-bin/image-manager.cgi?action=list&_=' + Date.now(), { credentials: 'include' });
        const text = await resp.text();
        if (!resp.ok) throw new Error('读取图片列表失败 HTTP ' + resp.status + '：' + text.slice(0, 160));
        let data;
        try { data = JSON.parse(text); }
        catch (e) { throw new Error('图片接口返回异常：' + text.slice(0, 180)); }
        if (!data || !data.success) throw new Error((data && data.error) || '图片接口返回失败');
        images = Array.isArray(data.images) ? data.images : [];
        document.getElementById('totalImages').textContent = data.total || images.length || 0;
        document.getElementById('unusedImages').textContent = data.unused_count || 0;
        renderImages();
      } catch (err) {
        imageGrid.innerHTML = '<div class="empty-state">加载失败：' + escHtml(err.message) + '</div>';
        deleteBtn.disabled = true;
      }
    }

    function renderImages() {
      const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
      const filtered = images.filter(function(item) {
        const filename = String((item && item.filename) || '').toLowerCase();
        return filename && (!keyword || filename.includes(keyword));
      });
      if (!filtered.length) {
        imageGrid.innerHTML = '<div class="empty-state">没有匹配图片。</div>';
        deleteBtn.disabled = true;
        return;
      }
      imageGrid.innerHTML = filtered.map(function(item) {
        const filename = String(item.filename || '');
        const encodedFilename = filename.split('/').map(encodeURIComponent).join('/');
        const usedClass = item.used ? ' used' : '';
        const fullUrl = window.location.origin + '/images/news/' + encodedFilename;
        return '<div class="image-card' + usedClass + '">' +
          '<div class="thumb-wrap"><img class="thumb" src="../images/news/' + escHtml(encodedFilename) + '" alt="' + escHtml(filename) + '" loading="lazy"></div>' +
          '<div class="meta"><strong>' + escHtml(filename) + '</strong>' +
          '<div class="image-meta-row"><span>' + escHtml(formatBytes(item.size || 0)) + '</span><span class="badge">' + (item.used ? '已使用' : '未使用') + '</span></div>' +
          '<code class="full-url" title="点击复制完整路径" data-url="' + escHtml(fullUrl) + '">' + escHtml(fullUrl) + '</code>' +
          '<div class="actions"><label class="select-label"><input type="checkbox" class="img-cb" data-filename="' + escHtml(filename) + '"> 选择</label>' +
          '<button class="btn-copy" data-url="' + escHtml(fullUrl) + '">复制路径</button>' +
          '<button class="btn-delete" data-filename="' + escHtml(filename) + '" style="grid-column:1 / -1">删除</button></div></div></div>';
      }).join('');
      document.querySelectorAll('.img-cb').forEach(function(cb) { cb.addEventListener('change', updateDeleteState); });
      document.querySelectorAll('.btn-delete').forEach(function(btn) { btn.addEventListener('click', handleSingleDelete); });
      document.querySelectorAll('.btn-copy').forEach(function(btn) { btn.addEventListener('click', handleCopyUrl); });
      document.querySelectorAll('.full-url').forEach(function(el) { el.addEventListener('click', handleCopyUrl); });
      updateDeleteState();
    }

    function formatBytes(bytes) {
      bytes = Number(bytes || 0);
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1).replace(/\.0$/, '') + ' KB';
      return (bytes / 1024 / 1024).toFixed(2).replace(/\.00$/, '') + ' MB';
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    async function handleCopyUrl(event) {
      const target = event.currentTarget;
      const url = target.dataset.url || target.textContent || '';
      if (!url) return;
      try {
        await copyText(url.trim());
        const oldText = target.textContent;
        if (target.tagName === 'BUTTON') {
          target.textContent = '已复制 ✓';
          setTimeout(function(){ target.textContent = '复制路径'; }, 1200);
        } else {
          target.textContent = '已复制：' + url.trim();
          setTimeout(function(){ target.textContent = oldText; }, 1200);
        }
      } catch (err) {
        alert('复制失败，请手动选中路径复制');
      }
    }

    function updateDeleteState() {
      const selected = document.querySelectorAll('.img-cb:checked');
      deleteBtn.disabled = selected.length === 0;
      deleteBtn.textContent = selected.length ? '删除所选图片（' + selected.length + '）' : '删除所选图片';
    }

    async function handleSingleDelete(event) {
      const filename = event.currentTarget.dataset.filename;
      if (!confirm('确认删除图片：' + filename + '？')) return;
      await deleteImages([filename]);
    }

    async function deleteImages(filenames) {
      if (!(await checkAuth())) return;
      deleteBtn.disabled = true;
      deleteBtn.textContent = '删除中...';
      try {
        const params = new URLSearchParams();
        params.append('action', 'delete');
        params.append('filenames', filenames.join(','));
        const resp = await fetch('../cgi-bin/image-manager.cgi', { method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'}, body: params.toString() });
        const data = await resp.json();
        if (!data.success) throw new Error((data.errors || [data.error]).filter(Boolean).join(', ') || '删除失败');
        await loadImages();
      } catch (err) {
        alert('删除失败：' + err.message);
        deleteBtn.disabled = false;
        deleteBtn.textContent = '删除所选图片';
      }
    }

    document.getElementById('uploadZone').addEventListener('dragenter', function() { this.classList.add('hover'); });
    document.getElementById('uploadZone').addEventListener('dragleave', function() { this.classList.remove('hover'); });
    document.getElementById('uploadZone').addEventListener('drop', function(event) {
      event.preventDefault();
      this.classList.remove('hover');
      const files = event.dataTransfer.files;
      if (files.length) document.getElementById('fileInput').files = files;
    });
    document.getElementById('uploadZone').addEventListener('dragover', function(event) { event.preventDefault(); });

    document.getElementById('uploadBtn').addEventListener('click', async function() {
      if (!(await checkAuth())) return;
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) { alert('请先选择图片'); return; }
      const formData = new FormData();
      formData.append('file', file);
      formData.append('rename', document.getElementById('renameInput').value.trim());
      const status = document.getElementById('uploadStatus');
      status.textContent = '上传中...';
      try {
        const resp = await fetch('../cgi-bin/image-upload.cgi', { method: 'POST', body: formData });
        const data = await resp.json();
        if (!data.success) throw new Error(data.error || '上传失败');
        status.textContent = '上传成功：' + data.filename;
        fileInput.value = '';
        document.getElementById('renameInput').value = '';
        await loadImages();
      } catch (err) {
        status.textContent = '上传失败：' + err.message;
      }
    });

    document.getElementById('searchInput').addEventListener('input', renderImages);
    deleteBtn.addEventListener('click', function() {
      const selected = Array.from(document.querySelectorAll('.img-cb:checked')).map(function(cb) { return cb.dataset.filename; });
      if (!selected.length) return;
      if (!confirm('确认删除 ' + selected.length + ' 张图片？')) return;
      deleteImages(selected);
    });
    window.addEventListener('DOMContentLoaded', function() { loadImages(); });
  </script>
  <script src="admin-nav.js?v=20260424" defer></script>
</body>
</html>
