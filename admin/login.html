<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户数据管理 - 登录</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-900: #0a1628;
      --blue-800: #0f2140;
      --blue-500: #2563eb;
      --blue-400: #3b82f6;
      --gray-900: #111827;
      --gray-700: #374151;
      --gray-500: #6b7280;
      --gray-400: #9ca3af;
      --gray-200: #e5e7eb;
      --gray-100: #f3f4f6;
      --white: #ffffff;
      --text: #1e293b;
      --accent: #2563eb;
      --radius: 8px;
      --shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--blue-900) 0%, var(--blue-800) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: var(--white);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-header h1 {
      font-size: 1.75rem;
      color: var(--blue-900);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .login-header p {
      color: var(--gray-500);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--gray-900);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .form-group input.error {
      border-color: #dc2626;
    }
    .error-message {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    .login-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--gray-500);
      font-size: 0.9rem;
    }
    .back-link a {
      color: var(--accent);
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 用户数据管理</h1>
      <p>请输入密码访问用户数据</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">访问密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
        <div class="error-message" id="errorMessage">密码错误，请重试</div>
      </div>
      <button type="submit" class="login-btn">进入管理系统</button>
    </form>
    <div class="back-link">
      <a href="../index.html">← 返回首页</a>
    </div>
  </div>

  <script>
    // 简单密码验证（使用简单的哈希函数）
  
    const CORRECT_PASSWORD = 'Feixiang8.';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const passwordInput = document.getElementById('password');
      const errorMessage = document.getElementById('errorMessage');
      const password = passwordInput.value;

      if (password === CORRECT_PASSWORD) {
        // 存储登录状态 (24小时后过期)
        const expiry = new Date().getTime() + 24 * 60 * 60 * 1000;
        localStorage.setItem('userAdminAuth', expiry);
        window.location.href = 'users-view.html';
      } else {
        passwordInput.classList.add('error');
        errorMessage.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    // 移除错误状态
    document.getElementById('password').addEventListener('input', function() {
      this.classList.remove('error');
      document.getElementById('errorMessage').classList.remove('show');
    });
  </script>
</body>
</html>
